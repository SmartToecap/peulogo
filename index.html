<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Peu A Peu Logo Export Suite</title>
  <style>
    :root {
      color-scheme: light;
      /* iOS light (systemGroupedBackground family) */
      --bg: #f2f2f7;
      --card: #ffffff;
      --nav-bg: rgba(249, 249, 249, .82);
      --label: #000000;
      --label-2: rgba(60, 60, 67, .6);
      --label-3: rgba(60, 60, 67, .3);
      --separator: rgba(60, 60, 67, .18);
      --separator-opaque: #c6c6c8;
      --fill-2: rgba(118, 118, 128, .12);
      --fill-3: rgba(118, 118, 128, .08);
      --seg-track: rgba(118, 118, 128, .12);
      --seg-selected: #ffffff;
      --seg-shadow: 0 1px 3px rgba(0, 0, 0, .12), 0 0 1px rgba(0, 0, 0, .12);
      --switch-off: rgba(120, 120, 128, .16);
      --slider-track: rgba(120, 120, 128, .2);
      --tint: #ff9500; /* systemOrange — ties to the logo */
      --tint-press: #e0830a;
      --checkA: #e6e6eb;
      --checkB: #fbfbfd;
      --shadow-card: 0 1px 2px rgba(0, 0, 0, .04);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        color-scheme: dark;
        --bg: #000000;
        --card: #1c1c1e;
        --nav-bg: rgba(28, 28, 30, .72);
        --label: #ffffff;
        --label-2: rgba(235, 235, 245, .6);
        --label-3: rgba(235, 235, 245, .3);
        --separator: rgba(84, 84, 88, .5);
        --separator-opaque: #38383a;
        --fill-2: rgba(118, 118, 128, .24);
        --fill-3: rgba(118, 118, 128, .18);
        --seg-track: rgba(118, 118, 128, .24);
        --seg-selected: #636366;
        --seg-shadow: 0 1px 3px rgba(0, 0, 0, .3);
        --switch-off: rgba(120, 120, 128, .32);
        --slider-track: rgba(120, 120, 128, .32);
        --tint: #ff9f0a;
        --tint-press: #d98008;
        --checkA: #2c2c2e;
        --checkB: #1c1c1e;
        --shadow-card: none;
      }
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #000000;
      --card: #1c1c1e;
      --nav-bg: rgba(28, 28, 30, .72);
      --label: #ffffff;
      --label-2: rgba(235, 235, 245, .6);
      --label-3: rgba(235, 235, 245, .3);
      --separator: rgba(84, 84, 88, .5);
      --separator-opaque: #38383a;
      --fill-2: rgba(118, 118, 128, .24);
      --fill-3: rgba(118, 118, 128, .18);
      --seg-track: rgba(118, 118, 128, .24);
      --seg-selected: #636366;
      --seg-shadow: 0 1px 3px rgba(0, 0, 0, .3);
      --switch-off: rgba(120, 120, 128, .32);
      --slider-track: rgba(120, 120, 128, .32);
      --tint: #ff9f0a;
      --tint-press: #d98008;
      --checkA: #2c2c2e;
      --checkB: #1c1c1e;
      --shadow-card: none;
    }

    * {
      box-sizing: border-box
    }

    html, body {
      height: 100%
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--label);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -.01em;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      transition: background-color .25s, color .25s;
    }

    .mono {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-variant-numeric: tabular-nums
    }

    /* ---------------- nav bar ---------------- */
    header {
      flex: none;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 11px 18px;
      border-bottom: .5px solid var(--separator);
      background: var(--nav-bg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      position: relative;
      z-index: 5;
    }

    .nav-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.02em
    }

    header .spacer {
      flex: 1
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .nav-btn {
      font: inherit;
      font-weight: 600;
      font-size: 16px;
      color: var(--tint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 4px;
      border-radius: 8px;
    }

    .nav-btn:active {
      opacity: .5
    }

    input[type=file] {
      display: none
    }

    /* ---------------- segmented control ---------------- */
    .seg {
      display: flex;
      background: var(--seg-track);
      border-radius: 9px;
      padding: 2px;
      gap: 0
    }

    .seg button {
      flex: 1;
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--label);
      background: transparent;
      border: 0;
      border-radius: 7px;
      padding: 5px 12px;
      cursor: pointer;
      transition: .18s;
      white-space: nowrap;
      position: relative;
    }

    .seg button.on {
      background: var(--seg-selected);
      box-shadow: var(--seg-shadow);
      font-weight: 600
    }

    .theme-seg {
      flex: none
    }

    /* ---------------- switch ---------------- */
    input[type=checkbox] {
      -webkit-appearance: none;
      appearance: none;
      flex: none;
      width: 51px;
      height: 31px;
      border-radius: 31px;
      background: var(--switch-off);
      position: relative;
      cursor: pointer;
      transition: background .25s;
      outline: none;
    }

    input[type=checkbox]::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 27px;
      height: 27px;
      border-radius: 50%;
      background: #fff;
      transition: transform .25s;
      box-shadow: 0 3px 8px rgba(0, 0, 0, .15), 0 1px 1px rgba(0, 0, 0, .16);
    }

    input[type=checkbox]:checked {
      background: var(--tint)
    }

    input[type=checkbox]:checked::before {
      transform: translateX(20px)
    }

    /* ---------------- range slider ---------------- */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      width: 100%;
      height: 28px;
      background: transparent;
      cursor: pointer;
      margin: 0;
    }

    input[type=range]::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, var(--tint) 0 var(--fill, 50%), var(--slider-track) var(--fill, 50%) 100%);
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 26px;
      height: 26px;
      margin-top: -11px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .3), 0 0 1px rgba(0, 0, 0, .2);
    }

    input[type=range]::-moz-range-track {
      height: 4px;
      border-radius: 2px;
      background: var(--slider-track)
    }

    input[type=range]::-moz-range-progress {
      height: 4px;
      border-radius: 2px;
      background: var(--tint)
    }

    input[type=range]::-moz-range-thumb {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .3)
    }

    /* ---------------- color well ---------------- */
    input[type=color] {
      -webkit-appearance: none;
      appearance: none;
      flex: none;
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      padding: 0;
      cursor: pointer;
      background: none;
      box-shadow: inset 0 0 0 2px #fff, 0 0 0 1px var(--separator-opaque);
    }

    input[type=color]::-webkit-color-swatch-wrapper {
      padding: 0
    }

    input[type=color]::-webkit-color-swatch {
      border: none;
      border-radius: 50%
    }

    input[type=color]::-moz-color-swatch {
      border: none;
      border-radius: 50%
    }

    /* ---------------- layout ---------------- */
    main {
      display: flex;
      flex: 1;
      min-height: 0
    }

    .stage-wrap {
      flex: 1;
      min-width: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px
    }

    #stage {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px;
      overflow: hidden;
      position: relative;
      border: .5px solid var(--separator);
      background-color: var(--checkB);
      background-image: linear-gradient(45deg, var(--checkA) 25%, transparent 25%),
      linear-gradient(-45deg, var(--checkA) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, var(--checkA) 75%),
      linear-gradient(-45deg, transparent 75%, var(--checkA) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
      transition: background-color .2s;
    }

    #stage.solid {
      background-image: none
    }

    #stage.drag {
      outline: 2.5px dashed var(--tint);
      outline-offset: -12px
    }

    .art {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      display: block
    }

    .stage-hint {
      display: none;
      position: absolute;
      bottom: 14px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: var(--label-3);
      pointer-events: none;
    }

    aside {
      width: 360px;
      flex: none;
      border-left: .5px solid var(--separator);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .section-title {
      padding: 18px 18px 7px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .03em;
      text-transform: uppercase;
      color: var(--label-2);
    }

    #layers {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 8px
    }

    #layers::-webkit-scrollbar {
      width: 0
    }

    .panel {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      margin: 0 16px
    }

    #layers .panel {
      margin: 0 0 14px
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      min-height: 46px;
      border-bottom: .5px solid var(--separator)
    }

    .row:last-child {
      border-bottom: none
    }

    .row label {
      flex: none;
      color: var(--label);
      font-size: 16px
    }

    .row.slider label {
      width: 64px
    }

    .grow {
      flex: 1
    }

    .val {
      font-size: 15px;
      color: var(--label-2);
      width: 50px;
      text-align: right;
      flex: none
    }

    .hex {
      font-size: 14px;
      color: var(--label-2);
      text-transform: uppercase;
      letter-spacing: .02em
    }

    /* layer card */
    .layer-head {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 13px 16px 11px;
      border-bottom: .5px solid var(--separator)
    }

    .layer-head .name {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -.02em
    }

    .layer-head .idx {
      font-size: 12px;
      color: var(--label-2);
      background: var(--fill-2);
      border-radius: 6px;
      padding: 2px 7px;
      margin-left: auto;
    }

    .seg-row {
      padding: 11px 16px;
      border-bottom: .5px solid var(--separator)
    }

    .seg-row.last {
      border-bottom: none
    }

    /* gradient sub-panel */
    .grad {
      margin: 2px 16px 12px;
      padding: 10px 12px;
      background: var(--fill-3);
      border-radius: 12px
    }

    .grad .row {
      padding: 8px 0;
      min-height: 40px;
      border-bottom: .5px solid var(--separator)
    }

    .grad .row:last-of-type {
      border-bottom: none
    }

    .stop {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: .5px solid var(--separator)
    }

    .stop:last-of-type {
      border-bottom: none
    }

    .stop .x {
      font: inherit;
      font-size: 20px;
      line-height: 1;
      color: var(--label-3);
      background: none;
      border: 0;
      cursor: pointer;
      padding: 0 2px;
      flex: none
    }

    .stop .x:hover {
      color: #ff3b30
    }

    .add-stop {
      font: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--tint);
      background: none;
      border: none;
      padding: 9px 0 4px;
      width: 100%;
      text-align: center;
      cursor: pointer
    }

    /* transform presets */
    .presets {
      flex-wrap: wrap;
      gap: 8px
    }

    .presets button {
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--tint);
      background: var(--fill-2);
      border: none;
      border-radius: 9px;
      padding: 7px 13px;
      cursor: pointer;
    }

    .presets button:active {
      opacity: .6
    }

    .presets .reset {
      margin-left: auto;
      color: var(--label-2)
    }

    /* dock */
    .dock {
      flex: none;
      padding-bottom: 16px
    }

    .num {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 15px;
      color: var(--label);
      background: var(--fill-2);
      border: none;
      border-radius: 8px;
      padding: 7px 10px;
      width: 84px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .num:focus {
      outline: 2px solid var(--tint);
      outline-offset: 0
    }

    .dim {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 14px;
      color: var(--label-2)
    }

    .btn-primary {
      margin: 14px 16px 0;
      width: calc(100% - 32px);
      font: inherit;
      font-weight: 600;
      font-size: 17px;
      color: #fff;
      background: var(--tint);
      border: none;
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      transition: .12s;
    }

    .btn-primary:active {
      background: var(--tint-press);
      transform: scale(.99)
    }

    @media (max-width: 820px) {
      main {
        flex-direction: column;
        overflow-y: scroll;
      }

      aside {
        width: 100%;
        border-left: none;
        border-top: .5px solid var(--separator)
      }

      .stage-wrap {
        padding: 16px;
        min-height: 40vh
      }

      .nav-title {
        font-size: 18px
      }

      .nav-actions {
        gap: 6px
      }
    }
  </style>
</head>
<body>
<header>
  <div class="nav-title">Peu A Peu Logo Export Suite</div>
  <div class="spacer"></div>
  <div class="nav-actions">
    <div class="seg theme-seg" id="themeSeg">
      <button data-theme-mode="auto" class="on">Auto</button>
      <button data-theme-mode="light">Light</button>
      <button data-theme-mode="dark">Dark</button>
    </div>
    <button class="nav-btn" id="sampleBtn">Reset to default</button>
    <button class="nav-btn" id="uploadBtn">Open File</button>
    <input type="file" id="fileInput" accept=".svg,image/svg+xml"/>
  </div>
</header>

<main>
  <div class="stage-wrap">
    <div id="stage"></div>
    <div class="stage-hint">Drop an SVG anywhere on the canvas to replace it</div>
  </div>

  <aside>
    <div class="section-title">Layers</div>
    <div id="layers"></div>

    <div class="dock">
      <div class="section-title">Transform</div>
      <div class="panel">
        <div class="row slider">
          <label>Rotate</label>
          <input type="range" id="rotRange" min="0" max="360" step="1" value="0"/>
          <span class="val mono" id="rotVal">0°</span>
        </div>
        <div class="row presets">
          <button data-rot="0">0°</button>
          <button data-rot="90">90°</button>
          <button data-rot="180">180°</button>
          <button data-rot="270">270°</button>
          <button class="reset" id="rotReset">Reset</button>
        </div>
      </div>

      <div class="section-title">Export</div>
      <div class="panel">
        <div class="row">
          <label>Width</label><span class="grow"></span>
          <input class="num" id="expWidth" type="number" min="16" max="8000" value="1200"/>
          <span class="dim">×</span><span class="dim" id="expHeight">—</span><span class="dim">px</span>
        </div>
        <div class="row">
          <label>Transparent</label><span class="grow"></span>
          <input type="checkbox" id="transparentChk" checked/>
        </div>
        <div class="row" id="bgRow" style="display:none">
          <label>Background</label><span class="grow"></span>
          <span class="hex mono" id="bgHex">#FFFFFF</span>
          <input type="color" id="bgColor" value="#ffffff"/>
        </div>
      </div>
      <button class="btn-primary" id="exportBtn">Export PNG</button>
    </div>
  </aside>
</main>

<script>

  const stage = document.getElementById("stage");
  const layersEl = document.getElementById("layers");
  const expWidth = document.getElementById("expWidth");
  const expHeight = document.getElementById("expHeight");
  const transChk = document.getElementById("transparentChk");
  const bgColor = document.getElementById("bgColor");
  const bgHex = document.getElementById("bgHex");
  const bgRow = document.getElementById("bgRow");
  const rotRange = document.getElementById("rotRange");
  const rotVal = document.getElementById("rotVal");

  let svgEl = null, rotGroup = null;
  let layers = [];
  let vb = {x: 0, y: 0, w: 100, h: 100};
  let rotation = 0;
  let themeMode = "auto";

  function rgbToHex(c) {
    if (!c) return null;
    c = c.trim();
    if (c === "none" || c === "transparent") return null;

  function buildLayers() {
    layers = findLayers(svgEl).map((el, i) => {
      const s = seed(el);
      return {
        id: ++uid, el, name: nameOf(el, i),
        fillType: "solid", solid: s.fill, fillEngaged: false, strokeEngaged: false,
        strokeOn: s.hasStroke, strokeColor: s.stroke, strokeWidth: s.sw,
        gradId: "rcs-grad-" + uid, gradEl: null,
        gradient: {
          type: "linear", angle: 45, cx: 0.5, cy: 0.5, r: 0.5,
          stops: [{color: s.fill, offset: 0, opacity: 100}, {color: "#ffffff", offset: 100, opacity: 100}]
        }
      };
    });
    renderAll();
  }

  function ensureDefs() {
    let d = svgEl.querySelector("defs");
    if (!d) {
      d = document.createElementNS(NS, "defs");
      svgEl.insertBefore(d, svgEl.firstChild);
    }
    return d;
  }

  function buildGradient(L) {
    const defs = ensureDefs();
    if (L.gradEl) L.gradEl.remove();
    const G = L.gradient;
    let g;
    if (G.type === "radial") {
      g = document.createElementNS(NS, "radialGradient");
      g.setAttribute("cx", G.cx);
      g.setAttribute("cy", G.cy);
      g.setAttribute("r", G.r);
    } else {
      g = document.createElementNS(NS, "linearGradient");
      const a = G.angle * Math.PI / 180;
      g.setAttribute("x1", (0.5 - Math.cos(a) / 2).toFixed(4));
      g.setAttribute("y1", (0.5 - Math.sin(a) / 2).toFixed(4));
      g.setAttribute("x2", (0.5 + Math.cos(a) / 2).toFixed(4));
      g.setAttribute("y2", (0.5 + Math.sin(a) / 2).toFixed(4));
    }
    g.setAttribute("id", L.gradId);
    [...G.stops].sort((a, b) => a.offset - b.offset).forEach(s => {
      const st = document.createElementNS(NS, "stop");
      st.setAttribute("offset", s.offset / 100);
      st.setAttribute("stop-color", s.color);
      st.setAttribute("stop-opacity", s.opacity / 100);
      g.appendChild(st);
    });
    defs.appendChild(g);
    L.gradEl = g;
  }

  function applyLayer(L) {
    let fillVal = null;
    if (L.fillEngaged) {
      if (L.fillType === "none") fillVal = "none";
      else if (L.fillType === "gradient") {
        buildGradient(L);
        fillVal = `url(#${L.gradId})`;
      } else fillVal = L.solid;
    }
    const targets = [L.el, ...paintables(L.el)];
    for (const t of targets) {
      if (fillVal !== null) {
        t.style.setProperty("fill", fillVal);
        t.removeAttribute("fill");
      }
      if (L.strokeEngaged) {
        if (L.strokeOn) {
          t.style.setProperty("stroke", L.strokeColor);
          t.style.setProperty("stroke-width", L.strokeWidth);
          t.removeAttribute("stroke");
          t.removeAttribute("stroke-width");
        } else {
          t.style.setProperty("stroke", "none");
          t.removeAttribute("stroke");
        }
      }
    }
  }

  /* ---------------- controls UI ---------------- */
  function el(tag, cls, html) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }

  function renderAll() {
    layersEl.innerHTML = "";
    layers.forEach((L, i) => layersEl.appendChild(renderCard(L, i)));
  }

  function renderCard(L, idx) {
    const card = el("div", "panel");

    const head = el("div", "layer-head");
    head.append(el("span", "name", L.name), el("span", "idx mono", String(idx + 1).padStart(2, "0")));
    card.append(head);

    // fill type
    const fillRow = el("div", "seg-row");
    const seg = el("div", "seg");
    [["solid", "Solid"], ["gradient", "Gradient"], ["none", "None"]].forEach(([v, lbl]) => {
      const b = el("button", L.fillType === v ? "on" : null, lbl);
      b.onclick = () => {
        L.fillType = v;
        L.fillEngaged = true;
        applyLayer(L);
        card.replaceWith(renderCard(L, idx));
      };
      seg.append(b);
    });
    fillRow.append(seg);
    card.append(fillRow);

    if (L.fillType === "solid") {
      card.append(colorRow("Color", L.solid, hex => {
        L.solid = hex;
        L.fillEngaged = true;
        applyLayer(L);
      }));
    } else if (L.fillType === "gradient") {
      card.append(renderGradient(L, idx, card));
    }

    // stroke toggle
    const stRow = el("div", "row");
    stRow.append(el("label", null, "Stroke"), el("span", "grow"));
    const cb = el("input");
    cb.type = "checkbox";
    cb.checked = L.strokeOn;
    cb.onchange = () => {
      L.strokeOn = cb.checked;
      L.strokeEngaged = true;
      applyLayer(L);
      card.replaceWith(renderCard(L, idx));
    };
    stRow.append(cb);
    card.append(stRow);

    if (L.strokeOn) {
      card.append(colorRow("Color", L.strokeColor, hex => {
        L.strokeColor = hex;
        L.strokeEngaged = true;
        applyLayer(L);
      }));
      const base = (L.strokeWidth && L.strokeWidth > 0) ? L.strokeWidth : Math.max(vb.w * 0.004, 0.5);
      const maxW = Math.max(base * 6, 4);
      const step = Math.max(+(maxW / 200).toPrecision(1), 0.01);
      const prec = maxW < 5 ? 2 : 1;
      card.append(sliderRow("Width", L.strokeWidth, 0, maxW, step,
        v => {
          L.strokeWidth = v;
          L.strokeEngaged = true;
          applyLayer(L);
        }, v => v.toFixed(prec)));
    }
    card.lastChild.classList?.add("last");
    return card;
  }

  function colorRow(label, value, onChange) {
    const r = el("div", "row");
    const c = el("input");
    c.type = "color";
    c.value = /^#[0-9a-f]{6}$/i.test(value) ? value : "#000000";
    const hex = el("span", "hex mono", c.value.toUpperCase());
    c.oninput = () => {
      hex.textContent = c.value.toUpperCase();
      onChange(c.value);
    };
    r.append(el("label", null, label), el("span", "grow"), hex, c);
    return r;
  }

  function sliderRow(label, value, min, max, step, onChange, fmt) {
    const r = el("div", "row slider");
    r.append(el("label", null, label));
    const s = el("input");
    s.type = "range";
    s.min = min;
    s.max = max;
    s.step = step;
    s.value = value;
    const out = el("span", "val mono", fmt(value));
    fillSlider(s);
    s.oninput = () => {
      const v = parseFloat(s.value);
      out.textContent = fmt(v);
      fillSlider(s);
      onChange(v);
    };
    r.append(s, out);
    return r;
  }

  function renderGradient(L, idx, card) {
    const G = L.gradient;
    const box = el("div", "grad");

    const typeRow = el("div", "row");
    const seg = el("div", "seg");
    [["linear", "Linear"], ["radial", "Radial"]].forEach(([v, lbl]) => {
      const b = el("button", G.type === v ? "on" : null, lbl);
      b.onclick = () => {
        G.type = v;
        L.fillEngaged = true;
        applyLayer(L);
        card.replaceWith(renderCard(L, idx));
      };
      seg.append(b);
    });
    typeRow.append(seg);
    box.append(typeRow);

    if (G.type === "linear") {
      box.append(sliderRow("Angle", G.angle, 0, 360, 1, v => {
        G.angle = v;
        L.fillEngaged = true;
        applyLayer(L);
      }, v => v + "°"));
    } else {
      box.append(sliderRow("Spread", G.r, 0.1, 1, 0.01, v => {
        G.r = v;
        L.fillEngaged = true;
        applyLayer(L);
      }, v => Math.round(v * 100) + "%"));
      box.append(sliderRow("Center X", G.cx, 0, 1, 0.01, v => {
        G.cx = v;
        L.fillEngaged = true;
        applyLayer(L);
      }, v => Math.round(v * 100) + "%"));
      box.append(sliderRow("Center Y", G.cy, 0, 1, 0.01, v => {
        G.cy = v;
        L.fillEngaged = true;
        applyLayer(L);
      }, v => Math.round(v * 100) + "%"));
    }

    G.stops.forEach((s, si) => {
      const row = el("div", "stop");
      const c = el("input");
      c.type = "color";
      c.value = s.color;
      c.oninput = () => {
        s.color = c.value;
        L.fillEngaged = true;
        applyLayer(L);
      };
      const pos = el("input");
      pos.type = "range";
      pos.min = 0;
      pos.max = 100;
      pos.step = 1;
      pos.value = s.offset;
      pos.style.flex = "1";
      fillSlider(pos);
      const out = el("span", "val mono", s.offset + "%");
      pos.oninput = () => {
        s.offset = parseInt(pos.value);
        out.textContent = s.offset + "%";
        fillSlider(pos);
        L.fillEngaged = true;
        applyLayer(L);
      };
      const x = el("button", "x", "×");
      x.title = "Remove stop";
      x.onclick = () => {
        if (G.stops.length <= 2) return;
        G.stops.splice(si, 1);
        L.fillEngaged = true;
        applyLayer(L);
        card.replaceWith(renderCard(L, idx));
      };
      if (G.stops.length <= 2) {
        x.style.opacity = ".25";
        x.style.cursor = "default";
      }
      row.append(c, pos, out, x);
      box.append(row);
    });
    const add = el("button", "add-stop", "+  Add color stop");
    add.onclick = () => {
      G.stops.push({color: "#888888", offset: 50, opacity: 100});
      L.fillEngaged = true;
      applyLayer(L);
      card.replaceWith(renderCard(L, idx));
    };
    box.append(add);
    return box;
  }

  /* ---------------- export ---------------- */
  function updateExportDims() {
    const w = parseInt(expWidth.value) || 0;
    expHeight.textContent = w > 0 ? Math.round(w / (vb.w / vb.h)) : "—";
  }

  function exportPNG() {
    if (!svgEl) return;
    const targetW = Math.max(16, Math.min(8000, parseInt(expWidth.value) || 1200));
    const targetH = Math.round(targetW / (vb.w / vb.h));
    const clone = svgEl.cloneNode(true);
    clone.classList.remove("art");
    clone.setAttribute("xmlns", NS);
    clone.setAttribute("width", targetW);
    clone.setAttribute("height", targetH);
    const data = new XMLSerializer().serializeToString(clone);
    const url = URL.createObjectURL(new Blob([data], {type: "image/svg+xml;charset=utf-8"}));
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = targetW;
      canvas.height = targetH;
      const ctx = canvas.getContext("2d");
      if (!transChk.checked) {
        ctx.fillStyle = bgColor.value;
        ctx.fillRect(0, 0, targetW, targetH);
      }
      ctx.drawImage(img, 0, 0, targetW, targetH);
      URL.revokeObjectURL(url);
      canvas.toBlob(b => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = `logo@${targetW}px.png`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 1500);
      }, "image/png");
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      alert("Couldn't rasterize this SVG. It likely references an external image or font — inline those into the file and try again.");
    };
    img.src = url;
  }

  /* ---------------- theme ---------------- */
  function applyTheme(mode) {
    themeMode = mode;
    const root = document.documentElement;
    if (mode === "auto") root.removeAttribute("data-theme");
    else root.setAttribute("data-theme", mode);
    document.querySelectorAll("#themeSeg button").forEach(b => b.classList.toggle("on", b.dataset.themeMode === mode));
    if (!transChk.checked) stage.style.backgroundColor = bgColor.value;
  }

  /* ---------------- wiring ---------------- */
  document.getElementById("uploadBtn").onclick = () => document.getElementById("fileInput").click();
  document.getElementById("sampleBtn").onclick = () => loadFromText(SAMPLE);
  document.getElementById("fileInput").onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => loadFromText(r.result);
    r.readAsText(f);
    e.target.value = "";
  };
  document.getElementById("exportBtn").onclick = exportPNG;
  expWidth.oninput = updateExportDims;

  transChk.onchange = () => {
    bgRow.style.display = transChk.checked ? "none" : "flex";
    stage.classList.toggle("solid", !transChk.checked);
    stage.style.backgroundColor = transChk.checked ? "" : bgColor.value;
  };
  bgColor.oninput = () => {
    bgHex.textContent = bgColor.value.toUpperCase();
    if (!transChk.checked) stage.style.backgroundColor = bgColor.value;
  };

  rotRange.oninput = () => {
    rotation = parseFloat(rotRange.value);
    rotVal.textContent = Math.round(rotation) + "°";
    fillSlider(rotRange);
    applyRotation();
  };
  document.querySelectorAll("[data-rot]").forEach(b => b.onclick = () => {
    rotation = +b.dataset.rot;
    rotRange.value = rotation;
    rotVal.textContent = rotation + "°";
    fillSlider(rotRange);
    applyRotation();
  });
  document.getElementById("rotReset").onclick = () => {
    rotation = 0;
    rotRange.value = 0;
    rotVal.textContent = "0°";
    fillSlider(rotRange);
    applyRotation();
  };

  document.querySelectorAll("#themeSeg button").forEach(b => b.onclick = () => applyTheme(b.dataset.themeMode));

  // drag & drop
  ["dragenter", "dragover"].forEach(ev => stage.addEventListener(ev, e => {
    e.preventDefault();
    stage.classList.add("drag");
  }));
  ["dragleave", "drop"].forEach(ev => stage.addEventListener(ev, e => {
    e.preventDefault();
    stage.classList.remove("drag");
  }));
  stage.addEventListener("drop", e => {
    const f = e.dataTransfer.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => loadFromText(r.result);
    r.readAsText(f);
  });

  // boot
  applyTheme("auto");
  fillSlider(rotRange);
  loadFromText(SAMPLE);
</script>
</body>
</html>
